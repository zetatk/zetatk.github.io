<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETATK | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #3b82f6; /* Modern Electric Blue */
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-color);
            filter: blur(130px);
            opacity: 0.15;
            z-index: 0;
        }

        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; }

        /* Main Container Card */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 550px;
            width: 90%;
            background: linear-gradient(145deg, rgba(22, 24, 32, 0.8), rgba(13, 14, 18, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Animated Logo Badge */
        .logo-badge {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 2rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            animation: pulseGlow 3s infinite ease-in-out;
        }

        /* Main Branding Title */
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Subtitle Text */
        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* Info Grid / Metrics placeholders */
        .status-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981; /* Green status dot */
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: blink 1.5s infinite;
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Action Contact Button */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: var(--text-main);
            color: var(--bg-color);
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .cta-btn:hover {
            background: var(--accent-color);
            color: var(--text-main);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* Animations */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.1); }
            50% { box-shadow: 0 0 20px var(--accent-glow); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-badge">SYSTEM INITIALIZATION</div>
        <h1>ZETATK</h1>
        <p>We are currently engineering a next-generation platform. A sophisticated digital interface is coming soon.</p>
        
        <div class="status-box">
            <div class="pulse-dot"></div>
            <div class="status-text">Core Infrastructure Active & Secure</div>
        </div>
        
    </div>

</body>
</html>
