<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETATK | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        :root {
            --bg-color: #080a10;
            --card-bg: rgba(14, 18, 28, 0.85);
            --accent-blue: #1d71b8; /* Matching your logo's primary blue */
            --accent-red: #d62227;  /* Matching your logo's sharp red */
            --blue-glow: rgba(29, 113, 184, 0.3);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Lights matched to your logo palette */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.12;
            z-index: 0;
        }
        body::before { 
            top: -100px; 
            left: -100px; 
            background: var(--accent-blue);
        }
        body::after { 
            bottom: -100px; 
            right: -100px; 
            background: var(--accent-red);
        }

        /* Main Container Card */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3.5rem 2.5rem;
            max-width: 550px;
            width: 90%;
            background: linear-gradient(145deg, rgba(14, 18, 28, 0.9), rgba(8, 10, 16, 0.95));
            border: 1px solid rgba(29, 113, 184, 0.15);
            border-radius: 28px;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* Dynamic Tech Badge */
        .logo-badge {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffffff;
            background: linear-gradient(90deg, rgba(29, 113, 184, 0.2), rgba(214, 34, 39, 0.2));
            padding: 6px 18px;
            border-radius: 100px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Logo Layout Element */
        .logo-wrapper {
            margin-bottom: 1.5rem;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-image {
            max-width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 15px var(--blue-glow));
            animation: float 4s ease-in-out infinite;
        }

        /* Branding Title */
        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #ffffff 60%, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Subtitle Descriptive Text */
        p {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        /* Connection Status Component */
        .status-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 1.2rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #0ef2a2; /* Custom Neon Green */
            border-radius: 50%;
            box-shadow: 0 0 12px #0ef2a2;
            animation: blink 1.8s infinite;
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .version-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-top: 1.5rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        
        #app-version {
            color: var(--accent-blue); /* This highlights the version number in your logo's blue */
            font-weight: 700;
        }

        /* Keyframe Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); filter: drop-shadow(0 8px 20px rgba(29, 113, 184, 0.4)); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Responsive Breakpoint scaling */
        @media (max-width: 480px) {
            h1 { font-size: 2.4rem; }
            .logo-image { max-width: 130px; }
            .container { padding: 2.5rem 1.5rem; }
        }
        
        
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-badge">System Initialization</div>
        <br>
        <div class="logo-wrapper">
            <img src="logo.png" alt="ZETATK Logo" class="logo-image">
        </div>

        <h1>ZETATK</h1>
        <p>We are currently engineering a next-generation platform. A sophisticated digital interface is coming soon.</p>
        
        <div class="status-box">
            <div class="pulse-dot"></div>
            <div class="status-text">Core Infrastructure Active & Secure</div>
        </div>
        <hr>
        <div class="version-text">Build Version: <span id="app-version"></span></div>
    </div>

    <br>
    <script>
        // Define your version number here
        const currentVersion = "v1.0.0.7";
    
        // Inject it into the HTML placeholder
        document.getElementById("app-version").textContent = currentVersion;
    </script>
    <script src="index.js?v=1.0.0.7"></script>
   
    

    
    

</body>
</html>
